<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Offline — whittle.tools</title>
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<style>
			:root {
				color-scheme: light dark;
			}
			body {
				margin: 0;
				min-height: 100dvh;
				display: grid;
				place-items: center;
				background: #0a0a0a;
				color: #fafafa;
				font-family:
					ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
				text-align: center;
				padding: 2rem;
			}
			.card {
				max-width: 28rem;
			}
			h1 {
				font-size: 1.5rem;
				margin: 0 0 0.5rem;
			}
			p {
				color: #a1a1a1;
				line-height: 1.6;
				margin: 0 0 1.5rem;
			}
			a {
				display: inline-block;
				padding: 0.6rem 1.2rem;
				border-radius: 0.6rem;
				background: #fafafa;
				color: #0a0a0a;
				text-decoration: none;
				font-weight: 600;
			}
		</style>
	</head>
	<body>
		<div class="card">
			<h1>You're offline</h1>
			<p>
				whittle.tools can't reach the network right now. Pages you've already
				visited stay available — reconnect to load new ones.
			</p>
			<a href="/">Try again</a>
		</div>
	</body>
</html>
